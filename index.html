<!doctype html> <html lang=en> <head> <meta charset=UTF-8> <meta name=viewport content="width=device-width,initial-scale=1"> <title>Blind Wordle</title> <meta property=og:title content="Blind Wordle"> <meta property=og:description content="Three guesses with no feedback, then it all gets revealed and you get one shot to finish."> <meta property=og:type content=https://mostevilsite.com/ > <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel=stylesheet> <style>body{font-family:Inter,sans-serif;background-color:#121213;color:#fff;text-align:center;padding:40px 20px}h1{font-size:2.5rem;margin-bottom:20px}.grid{display:grid;grid-template-columns:repeat(5,60px);grid-template-rows:60px;gap:10px;justify-content:center;margin-bottom:15px}.cell{width:60px;height:60px;border-radius:5px;border:2px solid #3a3a3c;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:default;user-select:none;transition:all .2s ease;font-weight:600}.gray{background-color:#3a3a3c}.yellow{background-color:#b59f3b}.green{background-color:#538d4e}.blind{background-color:#1a1a1a;border-color:#3a3a3c}button{background-color:#538d4e;color:#fff;border:none;padding:12px 25px;font-size:1.2rem;border-radius:5px;cursor:pointer;font-weight:600;margin-top:10px}button:disabled{background-color:#3a3a3c;cursor:not-allowed}#results{margin-top:30px;font-size:1.2rem;background-color:#1a1a1a;padding:20px;border-radius:10px;display:inline-block;max-width:90%;border:2px solid #333}#phase{font-size:1.1rem;margin-bottom:20px;color:#ccc}#howTo{max-width:480px;margin:0 auto 30px;background-color:#1a1a1a;border:2px solid #333;border-radius:10px;padding:16px 20px;font-size:.95rem;line-height:1.5;color:#ccc;text-align:left}#howTo strong{color:#fff}</style> </head> <body> <h1>Blind Wordle</h1> <div id=howTo> you cannot see what your guesses are (like if they are green or yellow or gray) and once you guess 3 times you can see all of them and have only 1 final chance to guess the word. </div> <div id=phase>Guess 1 of 3</div> <div id=grids></div> <button id=submitBtn onclick=submitGuess()>lock that shit in</button> <div id=results></div> <script>const maxRows=4,gridContainer=document.getElementById("grids"),resultsEl=document.getElementById("results"),phaseEl=document.getElementById("phase"),submitBtn=document.getElementById("submitBtn");let validWords=[],target="",currentRow=0,guesses=[],gameOver=!1;function startGame(){target=validWords[Math.floor(Math.random()*validWords.length)],currentRow=0,guesses=[],gameOver=!1,resultsEl.style.display="none",submitBtn.disabled=!1,submitBtn.textContent="lock that shit in",phaseEl.textContent="Guess 1 of 3",buildGrid()}function buildGrid(){gridContainer.innerHTML="";for(let e=0;e<maxRows;e++){const t=document.createElement("div");t.className="grid",t.id="row-"+e;for(let n=0;n<5;n++){const l=document.createElement("div");l.className="cell blind",l.id=`cell-${e}-${n}`,t.appendChild(l)}gridContainer.appendChild(t)}addTypingRow()}function addTypingRow(){document.getElementById("row-"+currentRow);const e=document.createElement("input");e.type="text",e.maxLength=5,e.id="typingInput",e.style.gridColumn="1 / -1",e.style.textAlign="center",e.style.textTransform="uppercase",e.style.fontSize="1.5rem",e.style.padding="10px",e.style.borderRadius="5px",e.style.border="2px solid #3a3a3c",e.style.backgroundColor="#1a1a1a",e.style.color="#fff",e.style.width="310px",e.style.marginTop="10px",e.placeholder="your guess...",e.oninput=()=>renderTyping(e.value.toUpperCase()),e.onkeydown=e=>{"Enter"===e.key&&submitGuess()};const t=document.createElement("div");t.appendChild(e),gridContainer.appendChild(t),e.focus()}function renderTyping(e){for(let t=0;t<5;t++){document.getElementById(`cell-${currentRow}-${t}`).textContent=e[t]||""}}function computePattern(e,t){let n=Array(5).fill("gray"),l=t.split("");for(let o=0;o<5;o++)e[o]===t[o]&&(n[o]="green",l[o]=null);for(let t=0;t<5;t++)if("gray"===n[t]){const o=l.indexOf(e[t]);-1!==o&&(n[t]="yellow",l[o]=null)}return n}function submitGuess(){if(gameOver)return;const e=document.getElementById("typingInput"),t=(e.value||"").toUpperCase();if(5!==t.length)return void(phaseEl.textContent="needs to be 5 letters");if(validWords.length&&!validWords.includes(t))return void(phaseEl.textContent="thats not a real word nigga");guesses[currentRow]=t;if(e.parentElement.remove(),currentRow<2){for(let e=0;e<5;e++){const n=document.getElementById(`cell-${currentRow}-${e}`);n.textContent=t[e],n.className="cell blind"}currentRow++,phaseEl.textContent=`Guess ${currentRow+1} of 3`,addTypingRow()}else if(2===currentRow){for(let e=0;e<5;e++){const n=document.getElementById(`cell-${currentRow}-${e}`);n.textContent=t[e],n.className="cell blind"}phaseEl.textContent="loading",setTimeout((()=>{for(let e=0;e<=2;e++){const t=computePattern(guesses[e],target);for(let n=0;n<5;n++){document.getElementById(`cell-${e}-${n}`).className=`cell ${t[n]}`}}guesses.slice(0,3).includes(target)?endGame(!0):(currentRow=3,phaseEl.textContent="LAST ONE",addTypingRow())}),500)}else{const e=computePattern(t,target);for(let n=0;n<5;n++){const l=document.getElementById(`cell-${currentRow}-${n}`);l.textContent=t[n],l.className=`cell ${e[n]}`}setTimeout((()=>endGame(t===target)),400)}}function endGame(e){gameOver=!0,submitBtn.disabled=!0,resultsEl.style.display="inline-block",resultsEl.innerHTML=e?`WOW, you got it. It was <strong>${target}</strong>.`:`NOT even close nigga. It was <strong>${target}</strong>.`;const t=document.createElement("div");t.style.marginTop="15px";const n=document.createElement("button");n.textContent="again",n.onclick=startGame,t.appendChild(n),resultsEl.appendChild(t)}fetch("https://gist.githubusercontent.com/dracos/dd0668f281e685bad51479e5acaadb93/raw/6bfa15d263d6d5b63840a8e5b64e04b382fdb079/valid-wordle-words.txt").then((e=>e.text())).then((e=>{validWords=e.split("\n").map((e=>e.trim().toUpperCase())).filter((e=>5===e.length)),startGame()}))</script>
